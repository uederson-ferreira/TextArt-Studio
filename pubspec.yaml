name: textart_studio
description: "Creative text editor for photos and videos"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Canvas / Editor
  flutter_painter_v2: ^2.1.0+1

  # Fonts
  google_fonts: ^6.2.1

  # Stickers / SVG / Animations
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # Export / Share
  screenshot: ^3.0.0
  image: ^4.2.0
  image_gallery_saver: ^2.0.3
  share_plus: ^10.0.2

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.3.0

  # DI
  get_it: ^8.0.2

  # Network
  dio: ^5.7.0

  # Utils
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  uuid: ^4.5.0

  # Animated GIF rendering (cross-platform frame-by-frame)

  # Color picker
  flutter_colorpicker: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/stickers/twemoji/
    - assets/stickers/shapes/
    - assets/lottie/

  # Fonts are loaded via google_fonts package (no local bundling needed for MVP)
